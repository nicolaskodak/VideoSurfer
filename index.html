<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 影片字幕分析播放器</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 自定義字體 */
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        /* 自定義滾動條樣式 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #2d3748; /* gray-800 */
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4a5568; /* gray-600 */
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #718096; /* gray-500 */
        }
        /* Tab 樣式 */
        .tab-btn.active {
            background-color: #4A5568; /* gray-600 */
            color: #E2E8F0; /* gray-200 */
        }
        /* 隱藏 Tab 內容 */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: flex;
        }
        /* 結果淡入動畫 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <!-- 主容器 -->
    <div class="container mx-auto p-4 md:p-6 lg:p-8">
        
        <!-- 標題 -->
        <header class="text-center mb-6">
            <h1 class="text-3xl md:text-4xl font-bold text-white">AI 影片字幕分析播放器</h1>
            <p class="text-gray-400 mt-2">上傳影片與字幕，使用 Gemini AI 分析影片主題</p>
        </header>

        <!-- 主要內容區域 -->
        <main class="w-full max-w-7xl mx-auto flex flex-col lg:flex-row gap-6">
            
            <!-- 左側：播放器與控制項 -->
            <div class="flex-grow lg:w-2/3 bg-gray-800 rounded-xl shadow-2xl p-4 flex flex-col">
                <!-- 影片播放器 -->
                <div class="relative aspect-video bg-black rounded-lg overflow-hidden mb-4">
                    <video id="videoPlayer" class="w-full h-full" controls>
                        <!-- 字幕軌道將會動態加入此處 -->
                        <p class="text-white p-4">請先上傳影片檔案。</p>
                    </video>
                </div>

                <!-- 上傳控制項 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div class="bg-gray-700 p-4 rounded-lg">
                        <label for="videoUpload" class="block text-lg font-semibold mb-2 text-blue-300">1. 上傳影片</label>
                        <input type="file" id="videoUpload" accept="video/*" class="block w-full text-sm text-gray-300 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer transition"/>
                    </div>
                    <div class="bg-gray-700 p-4 rounded-lg">
                        <label for="subtitleUpload" class="block text-lg font-semibold mb-2 text-green-300">2. 上傳字幕 (.vtt, .srt)</label>
                        <input type="file" id="subtitleUpload" accept=".vtt,.srt" class="block w-full text-sm text-gray-300 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-600 file:text-white hover:file:bg-green-700 cursor-pointer transition"/>
                    </div>
                </div>
                
                <!-- AI 分析控制項 -->
                <div class="bg-gray-700 p-4 rounded-lg">
                    <label class="block text-lg font-semibold mb-2 text-purple-300">3. AI 主題分析</label>
                    <input type="password" id="apiKeyInput" placeholder="在此輸入您的 Gemini API Key" class="w-full mb-3 bg-gray-600 border-2 border-gray-500 rounded-lg py-2 px-4 text-white focus:outline-none focus:border-purple-500 transition">
                    <div class="flex flex-col sm:flex-row gap-2">
                         <select id="languageSelect" class="flex-grow bg-gray-600 border-2 border-gray-500 rounded-lg py-2 px-4 text-white focus:outline-none focus:border-purple-500 transition">
                            <option value="繁體中文">繁體中文</option>
                            <option value="English">English</option>
                            <option value="日本語">日本語</option>
                            <option value="한국어">한국어</option>
                            <option value="Français">Français</option>
                            <option value="Español">Español</option>
                        </select>
                        <button id="analyzeButton" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200 flex items-center justify-center disabled:bg-gray-500 disabled:cursor-not-allowed sm:w-auto w-full mt-2 sm:mt-0">
                            <svg id="analyzeIcon" class="w-5 h-5 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 01-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 013.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 013.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 01-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM16.898 20.553L16.25 22.5l-.648-1.947a4.5 4.5 0 01-3.09-3.09L9.75 18l1.947-.648a4.5 4.5 0 013.09-3.09L16.25 12l.648 1.947a4.5 4.5 0 013.09 3.09L22.5 18l-1.947.648a4.5 4.5 0 01-3.09 3.09z" /></svg>
                            <svg id="loadingSpinner" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            分析主題
                        </button>
                    </div>
                    <!-- 進度條 -->
                    <div id="progressContainer" class="mt-3 hidden">
                        <div class="flex justify-between text-sm text-gray-300 mb-1">
                            <span id="progressLabel">分析進度</span>
                            <span id="progressText">0 / 0</span>
                        </div>
                        <div class="w-full bg-gray-600 rounded-full h-2.5">
                            <div id="progressBar" class="bg-purple-500 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側：搜尋與結果 -->
            <aside class="lg:w-1/3 bg-gray-800 p-4 rounded-xl shadow-2xl flex flex-col h-[70vh] lg:h-[80vh]">
                <!-- Tabs -->
                <div class="flex border-b border-gray-700 mb-4">
                    <button id="tab-search" class="tab-btn flex-1 py-2 px-4 text-gray-400 font-semibold rounded-t-lg transition active">字幕搜尋</button>
                    <button id="tab-analysis" class="tab-btn flex-1 py-2 px-4 text-gray-400 font-semibold rounded-t-lg transition">主題分析</button>
                </div>

                <!-- Tab Content: Search -->
                <div id="content-search" class="tab-content active flex-grow flex flex-col min-h-0">
                    <div class="relative mb-4 shrink-0">
                        <input type="text" id="searchInput" placeholder="在這裡輸入關鍵字..." class="w-full bg-gray-700 border-2 border-gray-600 rounded-lg py-2 pl-10 pr-4 text-white focus:outline-none focus:border-blue-500 transition">
                        <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </div>
                    <div id="searchResults" class="flex-grow overflow-y-auto pr-2 custom-scrollbar min-h-0">
                        <div class="flex items-center justify-center h-full"><p class="text-gray-500">請先上傳字幕檔案。</p></div>
                    </div>
                </div>

                <!-- Tab Content: Analysis -->
                <div id="content-analysis" class="tab-content flex-grow flex flex-col min-h-0">
                    <div class="flex gap-2 mb-3 shrink-0">
                        <button id="exportButton" class="flex-1 bg-teal-600 hover:bg-teal-700 disabled:bg-gray-500 disabled:cursor-not-allowed text-white text-sm font-semibold py-2 px-3 rounded-lg transition flex items-center justify-center">
                            <svg class="w-4 h-4 mr-1.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                            匯出分析
                        </button>
                        <label id="importButton" class="flex-1 bg-amber-600 hover:bg-amber-700 text-white text-sm font-semibold py-2 px-3 rounded-lg transition flex items-center justify-center cursor-pointer">
                            <svg class="w-4 h-4 mr-1.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
                            匯入分析
                            <input type="file" id="importFile" accept=".json" class="hidden">
                        </label>
                    </div>
                    <div id="analysisResults" class="flex-grow overflow-y-auto pr-2 custom-scrollbar min-h-0">
                        <div class="flex items-center justify-center h-full"><p class="text-gray-500">點擊「分析主題」以開始。</p></div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM 元素 ---
            const videoPlayer = document.getElementById('videoPlayer');
            const videoUpload = document.getElementById('videoUpload');
            const subtitleUpload = document.getElementById('subtitleUpload');
            const apiKeyInput = document.getElementById('apiKeyInput');
            const languageSelect = document.getElementById('languageSelect');
            const analyzeButton = document.getElementById('analyzeButton');
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            const analysisResults = document.getElementById('analysisResults');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const analyzeIcon = document.getElementById('analyzeIcon');
            const tabSearch = document.getElementById('tab-search');
            const tabAnalysis = document.getElementById('tab-analysis');
            const contentSearch = document.getElementById('content-search');
            const contentAnalysis = document.getElementById('content-analysis');

            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const exportButton = document.getElementById('exportButton');
            const importFile = document.getElementById('importFile');

            // --- 狀態變數 ---
            const MAX_CONCURRENCY = 3;
            let subtitleTrack = null;
            let currentCues = [];
            let analysisData = []; // 儲存分析結果供匯出

            // --- 事件監聽器 ---
            videoUpload.addEventListener('change', handleVideoUpload);
            subtitleUpload.addEventListener('change', handleSubtitleUpload);
            searchInput.addEventListener('input', performSearch);
            analyzeButton.addEventListener('click', handleAnalyzeClick);
            exportButton.addEventListener('click', handleExport);
            importFile.addEventListener('change', handleImport);
            tabSearch.addEventListener('click', () => switchTab('search'));
            tabAnalysis.addEventListener('click', () => switchTab('analysis'));

            // --- 函式 ---

            function switchTab(tabName) {
                if (tabName === 'search') {
                    tabSearch.classList.add('active');
                    tabAnalysis.classList.remove('active');
                    contentSearch.classList.add('active');
                    contentAnalysis.classList.remove('active');
                } else {
                    tabAnalysis.classList.add('active');
                    tabSearch.classList.remove('active');
                    contentAnalysis.classList.add('active');
                    contentSearch.classList.remove('active');
                }
            }

            function handleVideoUpload(event) {
                const file = event.target.files[0];
                if (file) {
                    const videoURL = URL.createObjectURL(file);
                    videoPlayer.src = videoURL;
                    videoPlayer.load();
                }
            }

            function handleSubtitleUpload(event) {
                const file = event.target.files[0];
                if (!file) return;

                if (file.name.toLowerCase().endsWith('.srt')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const srtContent = e.target.result;
                        const vttContent = convertSrtToVtt(srtContent);
                        const vttBlob = new Blob([vttContent], { type: 'text/vtt' });
                        const vttUrl = URL.createObjectURL(vttBlob);
                        setupSubtitleTrack(vttUrl);
                    };
                    reader.readAsText(file);
                } else {
                    const subtitleURL = URL.createObjectURL(file);
                    setupSubtitleTrack(subtitleURL);
                }
            }

            function convertSrtToVtt(srtText) {
                let vttText = "WEBVTT\n\n";
                const processedSrt = srtText
                    .replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2')
                    .replace(/^\d+\s*$/gm, '');
                vttText += processedSrt
                    .split(/\n\n+/)
                    .map(block => block.trim())
                    .filter(block => block)
                    .join('\n\n');
                return vttText;
            }
            
            function setupSubtitleTrack(subtitleURL) {
                const oldTrack = videoPlayer.querySelector('track');
                if (oldTrack) {
                    if (oldTrack.src.startsWith('blob:')) {
                        URL.revokeObjectURL(oldTrack.src);
                    }
                    oldTrack.remove();
                }
                
                subtitleTrack = null;
                currentCues = [];
                performSearch();

                const trackElement = document.createElement('track');
                trackElement.kind = 'subtitles';
                trackElement.label = '上傳字幕';
                trackElement.srclang = 'zh';
                trackElement.src = subtitleURL;
                trackElement.default = true;

                trackElement.addEventListener('load', () => {
                    videoPlayer.textTracks[0].mode = 'showing'; 
                    subtitleTrack = videoPlayer.textTracks[0];
                    
                    setTimeout(() => {
                        if (subtitleTrack && subtitleTrack.cues) {
                            currentCues = Array.from(subtitleTrack.cues);
                            console.log(`字幕軌已載入，共 ${currentCues.length} 條字幕。`);
                            performSearch();
                        }
                    }, 150);
                });

                videoPlayer.appendChild(trackElement);
            }

            function formatTime(seconds) {
                if (isNaN(seconds)) return '00:00:00';
                return new Date(seconds * 1000).toISOString().substr(11, 8);
            }

            function performSearch() {
                const searchTerm = searchInput.value.trim().toLowerCase();
                searchResults.innerHTML = '';

                if (!subtitleTrack || currentCues.length === 0) {
                    searchResults.innerHTML = '<div class="flex items-center justify-center h-full"><p class="text-gray-500">請先上傳有效的字幕檔案。</p></div>';
                    return;
                }

                const matchingCues = searchTerm === ''
                    ? currentCues
                    : currentCues.filter(cue => cue.text.toLowerCase().includes(searchTerm));

                if (matchingCues.length === 0) {
                    searchResults.innerHTML = searchTerm === ''
                        ? '<div class="flex items-center justify-center h-full"><p class="text-gray-500">請先上傳字幕檔案。</p></div>'
                        : `<div class="flex items-center justify-center h-full"><p class="text-gray-400">找不到包含 "${searchInput.value}" 的字幕。</p></div>`;
                } else {
                    matchingCues.forEach(cue => {
                        const resultItem = document.createElement('div');
                        resultItem.className = 'p-3 mb-2 bg-gray-700 rounded-lg cursor-pointer hover:bg-blue-600 hover:text-white transition-colors duration-200';
                        const highlightedText = cue.text.replace(new RegExp(searchTerm, 'gi'), (match) => `<span class="bg-yellow-400 text-black font-bold">${match}</span>`);
                        resultItem.innerHTML = `
                            <div class="font-mono text-sm text-blue-300 mb-1">[${formatTime(cue.startTime)}]</div>
                            <div class="text-gray-200">${highlightedText.replace(/\n/g, '<br>')}</div>
                        `;
                        resultItem.addEventListener('click', () => {
                            videoPlayer.currentTime = cue.startTime;
                            if (videoPlayer.paused) videoPlayer.play();
                        });
                        searchResults.appendChild(resultItem);
                    });
                }
            }

            function toggleLoading(isLoading) {
                if (isLoading) {
                    analyzeButton.disabled = true;
                    loadingSpinner.classList.remove('hidden');
                    analyzeIcon.classList.add('hidden');
                } else {
                    analyzeButton.disabled = false;
                    loadingSpinner.classList.add('hidden');
                    analyzeIcon.classList.remove('hidden');
                }
            }

            function updateProgress(completed, total) {
                const pct = total === 0 ? 0 : Math.round((completed / total) * 100);
                progressBar.style.width = `${pct}%`;
                progressText.textContent = `${completed} / ${total}`;
            }

            async function runWithConcurrency(tasks, concurrency, onTaskDone) {
                let index = 0;
                let completed = 0;
                const total = tasks.length;

                async function worker() {
                    while (index < total) {
                        const currentIndex = index++;
                        const result = await tasks[currentIndex]();
                        completed++;
                        onTaskDone(result, currentIndex, completed, total);
                    }
                }

                const workers = Array.from(
                    { length: Math.min(concurrency, total) },
                    () => worker()
                );
                await Promise.all(workers);
            }

            async function handleAnalyzeClick() {
                const apiKey = apiKeyInput.value.trim();
                if (!apiKey) {
                    renderAnalysisError("請先輸入您的 Gemini API Key。");
                    switchTab('analysis');
                    return;
                }
                if (currentCues.length === 0) {
                    renderAnalysisError("請先上傳字幕檔案。");
                    switchTab('analysis');
                    return;
                }

                toggleLoading(true);
                analysisResults.innerHTML = '';
                analysisData = [];
                switchTab('analysis');

                const selectedLang = languageSelect.value;
                const chunks = chunkSubtitlesByTime(currentCues, 180);

                // 顯示進度條
                progressContainer.classList.remove('hidden');
                updateProgress(0, chunks.length);

                // 預先建立佔位元素，確保結果按時間順序排列
                const resultSlots = new Array(chunks.length).fill(null);
                const placeholders = chunks.map((_, i) => {
                    const el = document.createElement('div');
                    el.id = `analysis-slot-${i}`;
                    analysisResults.appendChild(el);
                    return el;
                });

                const tasks = chunks.map((chunk, i) => () => callGeminiAPI(chunk, apiKey, selectedLang));

                await runWithConcurrency(tasks, MAX_CONCURRENCY, (result, idx, completed, total) => {
                    updateProgress(completed, total);
                    resultSlots[idx] = result;
                    renderSingleResult(placeholders[idx], result);
                });

                analysisData = resultSlots.filter(r => r && !r.error);

                toggleLoading(false);

                // 分析完成後短暫顯示 100%，然後隱藏進度條
                setTimeout(() => {
                    progressContainer.classList.add('hidden');
                }, 1500);

                if (analysisResults.querySelectorAll('[data-result]').length === 0) {
                    analysisResults.innerHTML = '<div class="flex items-center justify-center h-full"><p class="text-gray-400">分析完成，但未偵測到明確主題。</p></div>';
                }
            }

            function chunkSubtitlesByTime(cues, intervalSeconds) {
                if (!cues || cues.length === 0) return [];
                const chunks = [];
                let currentChunkCues = [];
                let segmentIndex = 0;

                for (const cue of cues) {
                    const cueSegmentIndex = Math.floor(cue.startTime / intervalSeconds);

                    if (cueSegmentIndex > segmentIndex) {
                        if (currentChunkCues.length > 0) {
                            const chunkText = currentChunkCues.map(c => `[${formatTime(c.startTime)}] ${c.text}`).join('\n');
                            chunks.push({ text: chunkText, startTime: currentChunkCues[0].startTime });
                        }
                        currentChunkCues = [cue];
                        segmentIndex = cueSegmentIndex;
                    } else {
                        currentChunkCues.push(cue);
                    }
                }

                // 確保最後一個片段也被加入
                if (currentChunkCues.length > 0) {
                    const chunkText = currentChunkCues.map(c => `[${formatTime(c.startTime)}] ${c.text}`).join('\n');
                    chunks.push({ text: chunkText, startTime: currentChunkCues[0].startTime });
                }
                return chunks;
            }

            async function callGeminiAPI(chunk, apiKey, language) {
                const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
                
                const prompt = `你是一位影片內容分析師。請總結以下字幕文字片段的核心主題。你的回答必須是單一的 JSON 物件，且不包含任何額外的文字或 markdown 標記。JSON 物件必須包含以下三個鍵：'topic' (字串，簡短的主題標題)、'description' (字串，對主題的1-2句話描述)、'startTime' (數字，此主題開始的秒數，請直接使用字幕時間戳的第一個時間點)。你的回答必須使用【${language}】。

字幕文字如下：

${chunk.text}`;

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `HTTP 錯誤! 狀態: ${response.status}`);
                    }

                    const data = await response.json();
                    if (!data.candidates || data.candidates.length === 0) {
                        throw new Error("API 回應中不包含有效的候選答案。");
                    }
                    const content = data.candidates[0].content.parts[0].text;
                    const cleanedContent = content.replace(/```json\n?|```/g, '').trim();
                    return JSON.parse(cleanedContent);
                } catch (error) {
                    console.error('Gemini API 呼叫失敗:', error);
                    // 讓 Promise.all 知道此請求失敗，但不要中斷所有請求
                    // 回傳一個帶有錯誤訊息的物件，以便統一處理
                    return { error: true, message: error.message, startTime: chunk.startTime };
                }
            }

            function renderSingleResult(placeholder, item) {
                if (!item) return;
                placeholder.setAttribute('data-result', 'true');

                if (item.error) {
                    placeholder.className = 'p-4 mb-3 bg-red-900 text-red-200 rounded-lg animate-fadeIn';
                    placeholder.innerHTML = `
                        <div class="font-bold">片段 [${formatTime(item.startTime)}] 分析失敗</div>
                        <p class="text-sm">${item.message}</p>
                    `;
                } else {
                    placeholder.className = 'p-4 mb-3 bg-gray-700 rounded-lg cursor-pointer hover:bg-purple-600 hover:text-white transition-colors duration-200 animate-fadeIn';
                    placeholder.innerHTML = `
                        <div class="flex items-center mb-2">
                            <span class="font-mono text-sm text-purple-300 mr-3">[${formatTime(item.startTime)}]</span>
                            <h3 class="font-bold text-lg">${item.topic || '未命名主題'}</h3>
                        </div>
                        <p class="text-gray-300 text-sm">${item.description || '沒有描述。'}</p>
                    `;
                    placeholder.addEventListener('click', () => {
                        videoPlayer.currentTime = item.startTime;
                        if (videoPlayer.paused) videoPlayer.play();
                    });
                }
            }

            function handleExport() {
                if (analysisData.length === 0) {
                    renderAnalysisError("沒有可匯出的分析結果，請先進行主題分析。");
                    return;
                }
                const exportObj = {
                    version: 1,
                    exportedAt: new Date().toISOString(),
                    topics: analysisData
                };
                const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `videosurfer-analysis-${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }

            function handleImport(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importObj = JSON.parse(e.target.result);
                        const topics = importObj.topics;
                        if (!Array.isArray(topics) || topics.length === 0) {
                            throw new Error("檔案中沒有有效的分析資料。");
                        }
                        analysisData = topics;
                        analysisResults.innerHTML = '';
                        topics.forEach(item => {
                            const el = document.createElement('div');
                            analysisResults.appendChild(el);
                            renderSingleResult(el, item);
                        });
                        switchTab('analysis');
                    } catch (err) {
                        renderAnalysisError(`匯入失敗：${err.message}`);
                        switchTab('analysis');
                    }
                };
                reader.readAsText(file);
                // 重設 input 以便重複匯入同一檔案
                event.target.value = '';
            }

            function renderAnalysisError(message) {
                analysisResults.innerHTML = `<div class="p-4 bg-red-900 text-red-200 rounded-lg">${message}</div>`;
            }

        });
    </script>

</body>
</html>
